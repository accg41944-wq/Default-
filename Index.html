<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Default</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060608;--s1:#0c0c10;--s2:#111116;
  --border:#16161f;--border2:#1e1e2a;--border3:#262636;
  --cyan:#00e5ff;--cyan2:#00b8d4;--green:#00e676;
  --text:#dde1f0;--text2:#8890aa;--text3:#454860;
  --r:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'DM Mono',monospace;
  background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;
  cursor:none;
}

/* custom cursor */
.cursor{
  position:fixed;width:8px;height:8px;
  background:var(--cyan);border-radius:50%;
  pointer-events:none;z-index:99999;
  transition:transform 0.15s ease, opacity 0.15s ease;
  transform:translate(-50%,-50%);
}
.cursor-ring{
  position:fixed;width:32px;height:32px;
  border:1px solid rgba(0,229,255,0.3);border-radius:50%;
  pointer-events:none;z-index:99998;
  transition:transform 0.35s ease, width 0.2s, height 0.2s, opacity 0.2s;
  transform:translate(-50%,-50%);
}

/* scanlines */
body::before{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.08) 3px,rgba(0,0,0,0.08) 4px);
  pointer-events:none;z-index:9998;
}

/* ambient */
.amb{position:fixed;pointer-events:none;}
.amb1{top:-300px;left:-200px;width:700px;height:700px;background:radial-gradient(circle,rgba(0,229,255,0.04) 0%,transparent 65%);}
.amb2{bottom:-300px;right:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(0,230,118,0.03) 0%,transparent 65%);}

/* ── NAV ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:1.1rem 2.5rem;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(6,6,8,0.85);backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
}
.logo{display:flex;align-items:center;gap:0.7rem;}
.logo svg{width:32px;height:32px;}
.logo-name{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;letter-spacing:0.08em;color:var(--text);text-transform:uppercase;}
.nav-right{display:flex;align-items:center;gap:1rem;}
.nav-status{display:flex;align-items:center;gap:0.45rem;font-size:0.7rem;color:var(--text3);}
.status-dot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(0.8);}}

/* ── HERO ── */
.hero{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:6rem 2rem 4rem;text-align:center;
  position:relative;
}
.hero-eyebrow{
  font-size:0.68rem;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--cyan);margin-bottom:1.8rem;
  display:flex;align-items:center;gap:0.8rem;
  animation:fadeUp 0.8s ease both;
}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';flex:1;max-width:40px;height:1px;background:var(--cyan);opacity:0.4;}

.hero h1{
  font-family:'Syne',sans-serif;font-size:clamp(3rem,10vw,7rem);
  font-weight:800;line-height:0.95;letter-spacing:-0.02em;
  color:var(--text);margin-bottom:1.5rem;
  animation:fadeUp 0.8s 0.1s ease both;
}
.hero h1 span{
  background:linear-gradient(135deg,var(--cyan),var(--green));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

.hero-sub{
  font-size:0.85rem;color:var(--text2);letter-spacing:0.05em;
  margin-bottom:3.5rem;
  animation:fadeUp 0.8s 0.2s ease both;
}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

/* ── ASK BOX ── */
.ask-wrap{
  width:100%;max-width:560px;
  animation:fadeUp 0.8s 0.3s ease both;
}
.ask-box{
  background:var(--s1);border:1px solid var(--border2);
  border-radius:18px;overflow:hidden;
  box-shadow:0 0 0 1px rgba(0,229,255,0.04), 0 40px 80px rgba(0,0,0,0.5);
  transition:border-color 0.3s,box-shadow 0.3s;
}
.ask-box:focus-within{
  border-color:rgba(0,229,255,0.2);
  box-shadow:0 0 0 1px rgba(0,229,255,0.08), 0 40px 80px rgba(0,0,0,0.5), 0 0 40px rgba(0,229,255,0.04);
}
.ask-top{padding:1.4rem 1.6rem 0;}
.ask-label{font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text3);margin-bottom:0.7rem;}
.ask-textarea{
  width:100%;background:transparent;border:none;outline:none;
  color:var(--text);font-family:'DM Mono',monospace;font-size:0.92rem;
  line-height:1.7;resize:none;min-height:110px;
  caret-color:var(--cyan);
}
.ask-textarea::placeholder{color:var(--text3);}
.ask-bottom{
  padding:1rem 1.6rem;
  display:flex;align-items:center;justify-content:space-between;
  border-top:1px solid var(--border);margin-top:0.8rem;
}
.ask-meta{font-size:0.65rem;color:var(--text3);display:flex;align-items:center;gap:0.5rem;}
.ask-meta span{color:var(--text2);}
.send-btn{
  padding:0.55rem 1.4rem;border:none;border-radius:8px;
  background:linear-gradient(135deg,rgba(0,229,255,0.15),rgba(0,230,118,0.1));
  border:1px solid rgba(0,229,255,0.25);
  color:var(--cyan);font-family:'DM Mono',monospace;font-size:0.8rem;
  font-weight:500;cursor:pointer;letter-spacing:0.05em;
  transition:all 0.2s;white-space:nowrap;
}
.send-btn:hover:not(:disabled){
  background:linear-gradient(135deg,rgba(0,229,255,0.22),rgba(0,230,118,0.15));
  transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,229,255,0.1);
}
.send-btn:disabled{opacity:0.35;cursor:not-allowed;transform:none;}

/* success state */
.sent-msg{
  display:none;text-align:center;padding:2rem;
  font-size:0.8rem;color:var(--green);letter-spacing:0.05em;
}

/* ── FEED ── */
.feed-section{max-width:560px;margin:0 auto;padding:0 2rem 6rem;}
.feed-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:1.2rem;padding-bottom:0.8rem;
  border-bottom:1px solid var(--border);
}
.feed-label{font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text3);}
.feed-count{font-size:0.65rem;color:var(--text3);}

.qa-item{
  margin-bottom:1px;background:var(--s1);
  border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;
  transition:border-color 0.2s;
}
.qa-item:hover{border-color:var(--border3);}
.qa-item+.qa-item{margin-top:0.6rem;}

.q-part{padding:1.1rem 1.3rem 0.9rem;}
.q-tag{font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:0.5rem;}
.q-text{font-size:0.88rem;line-height:1.7;color:var(--text);}
.q-time{font-size:0.62rem;color:var(--text3);margin-top:0.5rem;}

.a-part{
  padding:1rem 1.3rem;
  background:rgba(0,229,255,0.025);
  border-top:1px solid rgba(0,229,255,0.07);
}
.a-tag{font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--cyan);opacity:0.7;margin-bottom:0.5rem;}
.a-text{font-size:0.88rem;line-height:1.7;color:var(--text2);}

.pending{
  padding:0.8rem 1.3rem;
  border-top:1px solid var(--border);
  font-size:0.65rem;color:var(--text3);letter-spacing:0.05em;
  display:flex;align-items:center;gap:0.5rem;
}
.p-dot{width:4px;height:4px;border-radius:50%;background:var(--text3);animation:pulse 1.5s infinite;}

.react-row{padding:0.6rem 1.3rem;border-top:1px solid var(--border);display:flex;gap:0.5rem;}
.r-btn{
  background:none;border:1px solid var(--border2);
  color:var(--text3);font-size:0.65rem;padding:0.2rem 0.6rem;
  border-radius:6px;cursor:pointer;transition:all 0.2s;
  font-family:'DM Mono',monospace;letter-spacing:0.03em;
}
.r-btn:hover{border-color:var(--border3);color:var(--text2);}
.r-btn.on{border-color:rgba(0,229,255,0.3);color:var(--cyan);}

.no-feed{text-align:center;padding:3rem 1rem;font-size:0.72rem;color:var(--text3);letter-spacing:0.05em;}

/* toast */
.toast{
  position:fixed;bottom:2rem;left:50%;
  transform:translateX(-50%) translateY(60px);
  background:rgba(0,230,118,0.08);border:1px solid rgba(0,230,118,0.2);
  color:var(--green);padding:0.65rem 1.6rem;border-radius:50px;
  font-size:0.72rem;font-family:'DM Mono',monospace;letter-spacing:0.05em;
  z-index:9997;transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.err{background:rgba(255,50,80,0.08);border-color:rgba(255,50,80,0.2);color:#ff5060;}

.spin{display:inline-block;width:11px;height:11px;border:1.5px solid rgba(0,229,255,0.2);border-top-color:var(--cyan);border-radius:50%;animation:rot 0.7s linear infinite;vertical-align:middle;margin-right:0.3rem;}
@keyframes rot{to{transform:rotate(360deg);}}

@media(max-width:600px){
  nav{padding:1rem 1.2rem;}
  .hero{padding:5rem 1.2rem 3rem;}
  .feed-section{padding:0 1.2rem 5rem;}
}
</style>
</head>
<body>
<div class="cursor" id="cur"></div>
<div class="cursor-ring" id="ring"></div>
<div class="amb amb1"></div>
<div class="amb amb2"></div>

<nav>
  <div class="logo">
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="lg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#00e5ff"/>
          <stop offset="100%" stop-color="#00e676"/>
        </linearGradient>
      </defs>
      <circle cx="50" cy="46" r="28" stroke="url(#lg)" stroke-width="5.5"/>
      <line x1="64" y1="62" x2="76" y2="76" stroke="url(#lg)" stroke-width="5.5" stroke-linecap="round"/>
      <line x1="50" y1="26" x2="37" y2="60" stroke="url(#lg)" stroke-width="4.5" stroke-linecap="round"/>
      <line x1="50" y1="26" x2="63" y2="60" stroke="url(#lg)" stroke-width="4.5" stroke-linecap="round"/>
      <line x1="41" y1="48" x2="59" y2="48" stroke="url(#lg)" stroke-width="4" stroke-linecap="round"/>
    </svg>
    <span class="logo-name">Default</span>
  </div>
  <div class="nav-right">
    <div class="nav-status"><span class="status-dot"></span> online</div>
  </div>
</nav>

<section class="hero">
  <div class="hero-eyebrow">anonymous · honest · direct</div>
  <h1>Just <span>ask.</span></h1>
  <p class="hero-sub">// no name required. no filter applied.</p>

  <div class="ask-wrap">
    <div class="ask-box" id="askBox">
      <div class="ask-top">
        <div class="ask-label">your question</div>
        <textarea class="ask-textarea" id="qInput" placeholder="type anything..." maxlength="500" oninput="qCount()"></textarea>
      </div>
      <div class="ask-bottom">
        <div class="ask-meta">
          <span id="qCnt">0</span>/500 · 🔒 anonymous
        </div>
        <button class="send-btn" id="sendBtn" onclick="submitQ()">send →</button>
      </div>
    </div>
  </div>
</section>

<div class="feed-section">
  <div class="feed-header">
    <div class="feed-label">// questions & answers</div>
    <div class="feed-count" id="feedCnt"></div>
  </div>
  <div id="feed"><div class="no-feed">no questions yet. be the first.</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──
const STORE = 'default_data_v1';
const CFG_STORE = 'default_cfg_v1';
let db = load(STORE) || { questions:[], reacts:{} };
let cfg = load(CFG_STORE) || { ownerName:'Default', ownerDesc:'Just ask.', allowReacts:true };

function load(k){try{return JSON.parse(localStorage.getItem(k));}catch{return null;}}
function save(){localStorage.setItem(STORE,JSON.stringify(db));}

// ── CURSOR ──
const cur=document.getElementById('cur'), ring=document.getElementById('ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
(function animRing(){rx+=(mx-rx)*0.12;ry+=(my-ry)*0.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(animRing);})();
document.querySelectorAll('button,textarea,a').forEach(el=>{
  el.addEventListener('mouseenter',()=>{ring.style.width='48px';ring.style.height='48px';cur.style.transform='translate(-50%,-50%) scale(1.5)';});
  el.addEventListener('mouseleave',()=>{ring.style.width='32px';ring.style.height='32px';cur.style.transform='translate(-50%,-50%) scale(1)';});
});

// ── VISITOR INFO ──
const VK = 'dflt_fp';
let vmap = load(VK) || {};

function getVisitorInfo(){
  const ua = navigator.userAgent;
  const mob = /Mobi|Android|iPhone|iPad/i.test(ua);
  let browser='Unknown';
  if(/Chrome\//.test(ua)&&!/Edg\//.test(ua))browser='Chrome';
  else if(/Firefox\//.test(ua))browser='Firefox';
  else if(/Safari\//.test(ua)&&!/Chrome/.test(ua))browser='Safari';
  else if(/Edg\//.test(ua))browser='Edge';
  else if(/OPR\//.test(ua))browser='Opera';
  let os='Unknown';
  if(/Windows/.test(ua))os='Windows';
  else if(/Mac OS/.test(ua)&&!mob)os='macOS';
  else if(/Android/.test(ua))os='Android';
  else if(/iPhone|iPad/.test(ua))os='iOS';
  else if(/Linux/.test(ua))os='Linux';
  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone||'';
  const region=tz.replace('_',' ');
  const fp=btoa(navigator.language+screen.width+screen.colorDepth+(navigator.hardwareConcurrency||2)).replace(/=/g,'').slice(0,14);
  vmap[fp]=(vmap[fp]||0)+1;
  localStorage.setItem(VK,JSON.stringify(vmap));
  const conn=(navigator.connection||{});
  return{
    fp, mob, browser, os, region, tz,
    lang:navigator.language||'—',
    screen:`${screen.width}×${screen.height}`,
    visits:vmap[fp],
    connType:conn.effectiveType||'unknown',
    connSpeed:conn.downlink?conn.downlink+'Mbps':'—',
    ip:'fetching...'
  };
}

// fetch IP
async function fetchIP(){
  try{
    const r=await fetch('https://api.ipify.org?format=json');
    const d=await r.json();
    return d.ip||'—';
  }catch{return '—';}
}

// ── SUBMIT ──
function qCount(){document.getElementById('qCnt').textContent=document.getElementById('qInput').value.length;}

async function submitQ(){
  const txt=document.getElementById('qInput').value.trim();
  if(!txt){toast('write something first.',true);return;}
  const btn=document.getElementById('sendBtn');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span>sending';
  const info=getVisitorInfo();
  const ip=await fetchIP();
  info.ip=ip;
  const q={
    id:Date.now(),text:txt,
    time:new Date().toISOString(),
    reply:null,isPublic:false,isNew:true,reacts:0,
    visitor:info
  };
  db.questions.unshift(q);save();
  renderFeed();
  document.getElementById('qInput').value='';qCount();
  toast('sent. answer coming soon.');
  btn.disabled=false;btn.innerHTML='send →';
}

// ── FEED ──
function renderFeed(){
  const visible=db.questions.filter(q=>q.isPublic);
  document.getElementById('feedCnt').textContent=visible.length?`${visible.length} total`:'';
  const feed=document.getElementById('feed');
  if(!visible.length){feed.innerHTML='<div class="no-feed">no questions yet. be the first.</div>';return;}
  feed.innerHTML=visible.map((q,i)=>{
    const reacted=(db.reacts||{})[q.id];
    return`<div class="qa-item" style="animation:fadeUp 0.4s ${i*0.04}s ease both">
      <div class="q-part">
        <div class="q-tag">question</div>
        <div class="q-text">${esc(q.text)}</div>
        <div class="q-time">${relTime(q.time)}</div>
      </div>
      ${q.reply
        ?`<div class="a-part"><div class="a-tag">answer</div><div class="a-text">${esc(q.reply)}</div></div>`
        :`<div class="pending"><span class="p-dot"></span>awaiting answer</div>`}
      ${cfg.allowReacts?`<div class="react-row"><button class="r-btn ${reacted?'on':''}" onclick="toggleReact(${q.id},this)">↑ ${q.reacts||0}</button></div>`:''}
    </div>`;
  }).join('');
}

function toggleReact(id,btn){
  if(!db.reacts)db.reacts={};
  const q=db.questions.find(q=>q.id===id);if(!q)return;
  if(db.reacts[id]){q.reacts=Math.max(0,(q.reacts||1)-1);delete db.reacts[id];btn.classList.remove('on');}
  else{q.reacts=(q.reacts||0)+1;db.reacts[id]=true;btn.classList.add('on');}
  btn.innerHTML=`↑ ${q.reacts}`;
  save();
}

// ── HELPERS ──
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
function relTime(iso){
  const m=Math.floor((Date.now()-new Date(iso))/60000);
  if(m<1)return 'just now';if(m<60)return`${m}m ago`;
  const h=Math.floor(m/60);if(h<24)return`${h}h ago`;
  return`${Math.floor(h/24)}d ago`;
}
function toast(msg,err=false){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`toast${err?' err':''} show`;
  setTimeout(()=>t.classList.remove('show'),3000);
}

renderFeed();
</script>
</body>
</html>
